<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chai aur code | DOM</title>
  </head>
  <body style="background-color: #212121; color: #fff">
    <ul class="language">
      <li>Javascript</li>
    </ul>
  </body>
  <script>
    // function createListEle(content = "Default") {
    //   let lang = document.querySelector(".language");
    //   let li = document.createElement("li");
    //   let text = document.createTextNode(content);
    //   li.appendChild(text);
    //   lang.appendChild(li);
    // }

    let createListEle = (content = "Default") => {
      let li = document.createElement("li");
      li.appendChild(document.createTextNode(content));
      document.querySelector(".language").prepend(li);
    };

    createListEle("C++");
    createListEle("Java");
    createListEle("Python");
    createListEle();

    let secli = document.querySelector("li:nth-child(2)");
    let newli = document.createElement("li");
    newli.textContent = "NOTHING";
    secli.replaceWith(newli);

    const firstele = document.querySelector('li:first-child');
    firstele.outerHTML = '<li>Typescript </li>'

    document.querySelector('li:last-child').remove()
  </script>
</html>
